name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Leave empty to use the current commit.'
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS is built ARM-native only — `macos-latest` already runs on
          # Apple Silicon, and Apple Silicon is the only Mac hardware
          # llama.cpp users meaningfully care about for local inference.
          # If we ever need an x86_64 build, add it here as a separate row
          # (cleaner than a universal binary, which would double the .dmg
          # size and complicate updater signatures).
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux Tauri prerequisites
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build & bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these as repo secrets to enable signed
          # auto-updates. Without them tauri-action skips signature generation
          # and the in-app updater will report "no update" indefinitely.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Llama Recipe Manager ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/Llama-Recipe-Manager/llama-recipe-manager/blob/main/CHANGELOG.md)
            for what changed in this release.
          releaseDraft: true
          prerelease: false
          # Emit `latest.json` alongside binaries so the updater plugin can
          # discover new releases via the configured GitHub endpoint.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
