name: Publish to AUR

# Two parallel jobs:
#   - `stable` mirrors the stable PKGBUILD to AUR on every GitHub Release.
#     The release source tarball is fetched, sha256 is computed inside an
#     Arch container by `updpkgsums`, and the result is pushed to the
#     `llama-recipe-manager` AUR repo.
#   - `git` republishes the VCS PKGBUILD whenever it changes in-tree, or
#     on demand via workflow_dispatch. It does NOT need to run on every
#     release: AUR users `git pull && makepkg -si` and pkgver() picks up
#     the new commit automatically.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   AUR_USERNAME           — your AUR account username (also packager name)
#   AUR_EMAIL              — packager email
#   AUR_SSH_PRIVATE_KEY    — private key whose public half is registered in
#                            your AUR account at https://aur.archlinux.org/account
#
# First-time setup, before this workflow can succeed:
#   1. Create both packages on AUR (initial empty submission via `git
#      push aur main` from a local clone of `ssh://aur@aur.archlinux.org/<pkg>.git`).
#   2. Add the secrets above.
# After that this workflow keeps both PKGBUILDs in sync on every release.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'packaging/aur/**'
      - '.github/workflows/aur.yml'
  workflow_dispatch:
    inputs:
      package:
        description: 'Which AUR package(s) to push'
        required: true
        default: 'both'
        type: choice
        options: [stable, git, both]

jobs:
  stable:
    name: llama-recipe-manager (stable)
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.package == 'stable' || inputs.package == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            ref="${{ github.event.release.tag_name }}"
          else
            ref="$(jq -r .version < package.json)"
          fi
          # Strip leading "v" if present.
          v="${ref#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved AUR pkgver: $v"

      - name: Render PKGBUILD
        run: |
          mkdir -p out/llama-recipe-manager
          sed "s/__PKGVER__/${{ steps.ver.outputs.version }}/g" \
            packaging/aur/llama-recipe-manager/PKGBUILD.tmpl \
            > out/llama-recipe-manager/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: llama-recipe-manager
          pkgbuild: out/llama-recipe-manager/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: 'release: v${{ steps.ver.outputs.version }}'
          # Lets the action compute correct sha256 inside an Arch container
          # (the runner is Ubuntu, so we can't run updpkgsums ourselves
          # without pulling a full Arch toolchain).
          updpkgsums: true
          # Validates PKGBUILD via `makepkg --printsrcinfo` before pushing.
          test: true

  git:
    name: llama-recipe-manager-git (VCS)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.package == 'git' || inputs.package == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: llama-recipe-manager-git
          pkgbuild: packaging/aur/llama-recipe-manager-git/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: 'update: refresh PKGBUILD'
          # `-git` uses VCS sources with sha256sums=SKIP — no checksum step.
          updpkgsums: false
          test: true
